<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>femras — FEM RAS/ASR</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
<div id="app">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header>
    <span class="logo">femras</span>
    <div class="mode-tabs">
      <button class="mode-tab active" data-view="text" data-i18n="mode_text">Texto</button>
      <button class="mode-tab"        data-view="canvas" data-i18n="mode_canvas">Canvas</button>
    </div>
    <div class="spacer"></div>
    <button class="ghost" id="lang">EN</button>
  </header>

  <div id="main">

    <!-- ═══════════════════ TEXT MODE ═══════════════════ -->
    <div id="text-layout">
      <div id="text-left">
        <div class="panel">
          <div class="panel-title" data-i18n="config">Ficha de datos</div>
          <div class="row">
            <button class="ghost sm" data-load="beam" data-i18n="ex_beam">Ejemplo viga</button>
            <button class="ghost sm" data-load="dam"  data-i18n="ex_dam">Ejemplo presa</button>
          </div>
          <textarea id="cfg" spellcheck="false"></textarea>
          <div class="row" style="margin-top:8px">
            <button id="preview" data-i18n="preview">Previsualizar malla</button>
            <button id="run"     data-i18n="run">Calcular</button>
          </div>
          <div class="status-text" id="status"></div>
        </div>
      </div>

      <div id="text-right">
        <div class="panel">
          <div class="panel-title" data-i18n="mesh">Malla / Geometría</div>
          <svg id="mesh-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div class="panel">
          <div class="panel-title" data-i18n="results">Resultados</div>
          <div class="plot-wrap"><div id="curve"></div></div>
        </div>
        <div class="panel">
          <div class="panel-title" data-i18n="summary">Resumen</div>
          <div class="kv" id="summary"></div>
        </div>
      </div>
    </div><!-- end text-layout -->

    <!-- ═══════════════════ CANVAS MODE ═══════════════════ -->
    <div id="canvas-layout">

      <!-- Tool palette -->
      <aside id="tool-palette">
        <button class="icon-btn ed-tool active" data-tool="vertex"
                title="Vértice (V)" data-i18n-title="canvas.tool_vertex">
          <span class="icon">✦</span>
          <span data-i18n="canvas.tool_vertex">Vértice</span>
          <span class="kbd">V</span>
        </button>

        <div class="tool-sep"></div>

        <button class="icon-btn ed-tool" data-tool="support" data-stype="fixed"
                title="Apoyo fijo (F)" data-i18n-title="canvas.tool_fixed">
          <span class="icon">△</span>
          <span data-i18n="canvas.tool_fixed">Fijo</span>
          <span class="kbd">F</span>
        </button>
        <button class="icon-btn ed-tool" data-tool="support" data-stype="roller_x"
                title="Rodillo X (X)">
          <span class="icon">⊿</span>
          <span data-i18n="canvas.tool_rollerx">Rod.X</span>
          <span class="kbd">X</span>
        </button>
        <button class="icon-btn ed-tool" data-tool="support" data-stype="roller_y"
                title="Rodillo Y (Y)">
          <span class="icon">◁</span>
          <span data-i18n="canvas.tool_rollery">Rod.Y</span>
          <span class="kbd">Y</span>
        </button>

        <div class="tool-sep"></div>

        <button class="icon-btn ed-tool" data-tool="load"
                title="Carga puntual (L)">
          <span class="icon">↓</span>
          <span data-i18n="canvas.tool_load">Carga</span>
          <span class="kbd">L</span>
        </button>
        <button class="icon-btn ed-tool" data-tool="edge"
                title="Cara hidráulica (E)">
          <span class="icon">〜</span>
          <span data-i18n="canvas.tool_edge">Cara H.</span>
          <span class="kbd">E</span>
        </button>

        <div class="tool-sep"></div>

        <button class="icon-btn ed-tool" data-tool="esupport" data-stype="fixed"
                title="Apoyo en arista (G)" data-i18n-title="canvas.tool_esupport">
          <span class="icon">⩒</span>
          <span data-i18n="canvas.tool_esupport">Apoyo ar.</span>
          <span class="kbd">G</span>
        </button>
        <button class="icon-btn ed-tool" data-tool="eload"
                title="Carga en arista (B)" data-i18n-title="canvas.tool_eload">
          <span class="icon">⇊</span>
          <span data-i18n="canvas.tool_eload">Carga ar.</span>
          <span class="kbd">B</span>
        </button>

        <div class="tool-sep"></div>

        <button class="icon-btn ed-tool" data-tool="delete"
                title="Borrar (D)">
          <span class="icon">✕</span>
          <span data-i18n="canvas.tool_delete">Borrar</span>
          <span class="kbd">D</span>
        </button>
      </aside>

      <!-- Canvas center -->
      <div id="canvas-center">
        <div id="ed-canvas-wrap">
          <svg id="ed-svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <marker id="ed-arrow" markerWidth="8" markerHeight="8"
                refX="6" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#f87171"/>
              </marker>
            </defs>
            <g id="ed-world" transform="scale(1,-1)"></g>
          </svg>
        </div>
        <!-- Status bar -->
        <div id="canvas-statusbar">
          <span id="ed-coords">—</span>
          <span class="sb-sep"></span>
          <span id="ed-status" data-i18n="canvas.st_no_verts">Hacé clic en el canvas para agregar vértices.</span>
        </div>
      </div>

      <!-- Right panel -->
      <aside id="right-panel">

        <!-- Property Inspector -->
        <div class="acc-section expanded" id="sec-inspector">
          <div class="acc-header" onclick="toggleAcc('sec-inspector')">
            <span data-i18n="canvas.sec_inspector">Propiedades</span>
            <span class="chevron">▾</span>
          </div>
          <div class="acc-body" id="body-inspector">
            <div id="inspector-content">
              <p class="inspector-empty" data-i18n="canvas.ins_none">Sin selección.</p>
            </div>
          </div>
        </div>

        <!-- Load Schedule -->
        <div class="acc-section expanded" id="sec-schedule">
          <div class="acc-header" onclick="toggleAcc('sec-schedule')">
            <span data-i18n="canvas.sec_schedule">Historial de carga</span>
            <span class="chevron">▾</span>
          </div>
          <div class="acc-body" id="body-schedule">
            <div id="schedule-list"></div>
            <button class="ghost sm" style="margin-top:6px;width:100%"
                    onclick="addScheduleStep()" data-i18n="canvas.sch_add">+ Agregar paso</button>
            <div id="schedule-preview">
              <svg id="schedule-svg" width="100%" height="60"></svg>
            </div>
          </div>
        </div>

        <!-- Geometry / mesh settings (polygon mode) -->
        <div class="acc-section expanded" id="sec-geometry">
          <div class="acc-header" onclick="toggleAcc('sec-geometry')">
            <span data-i18n="canvas.sec_geometry">Geometría</span>
            <span class="chevron">▾</span>
          </div>
          <div class="acc-body" id="body-geometry">
            <!-- Polygon form -->
            <div id="poly-form">
              <div class="field-row">
                <label data-i18n="canvas.lbl_meshsize">Tamaño malla (mm)</label>
                <input id="ed-meshsize" type="number" value="2000" min="100" step="100">
              </div>
              <div class="field-row">
                <label data-i18n="canvas.lbl_thickness">Espesor (mm)</label>
                <input id="ed-thickness" type="number" value="1000" min="1">
              </div>
              <div class="field-row">
                <label data-i18n="canvas.lbl_probtype">Tipo problema</label>
                <select id="ed-probtype">
                  <option value="plane_strain" data-i18n="canvas.opt_strain">Def. plana</option>
                  <option value="plane_stress" data-i18n="canvas.opt_stress">Tens. plana</option>
                </select>
              </div>
              <div id="ed-time-range">
                <div class="panel-title" style="margin-top:8px"
                     data-i18n="canvas.lbl_timerange">Tiempo (carga variable)</div>
                <div class="field-row">
                  <label data-i18n="canvas.lbl_tstart">t inicial</label>
                  <input id="ed-tstart" type="number" value="0" step="any">
                </div>
                <div class="field-row">
                  <label data-i18n="canvas.lbl_tend">t final</label>
                  <input id="ed-tend" type="number" value="1" step="any">
                </div>
                <div class="field-row">
                  <label data-i18n="canvas.lbl_dt">Δt</label>
                  <input id="ed-dt" type="number" value="0.05" step="any" min="0.0001">
                </div>
              </div>
            </div>
            <!-- Beam form -->
            <div id="beam-form" style="display:none">
              <div class="field-row"><label data-i18n="canvas.lbl_L">L (mm)</label><input id="bm-L" type="number" value="430"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_H">H (mm)</label><input id="bm-H" type="number" value="105"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_nx">nx</label><input id="bm-nx" type="number" value="86"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_ny">ny</label><input id="bm-ny" type="number" value="21"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_nw">Entalla ancho (mm)</label><input id="bm-notchW" type="number" value="3"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_nh">Entalla alto (mm)</label><input id="bm-notchH" type="number" value="52.5"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_sp">Vano apoyos (mm)</label><input id="bm-span" type="number" value="400"></div>
              <div class="field-row"><label data-i18n="canvas.lbl_th">Espesor (mm)</label><input id="bm-thickness" type="number" value="75"></div>
              <svg id="bm-svg"></svg>
            </div>
          </div>
        </div>

        <!-- Templates + Export (bottom scrollable) -->
        <div id="panel-bottom">
          <div>
            <div class="panel-title" data-i18n="canvas.sec_templates">Plantillas</div>
            <div class="row">
              <button class="ghost sm" onclick="editorLoadTemplate('dam')" data-i18n="canvas.tpl_dam">Presa</button>
              <button class="ghost sm" onclick="editorLoadTemplate('beam')" data-i18n="canvas.tpl_beam">Viga</button>
            </div>
          </div>
          <div>
            <div class="row">
              <button id="ed-prev-btn" data-i18n="canvas.btn_preview">Ver malla</button>
              <button id="ed-export-btn" class="ghost" data-i18n="canvas.btn_export">Exportar a Texto</button>
            </div>
          </div>
        </div>

      </aside><!-- end right-panel -->
    </div><!-- end canvas-layout -->

  </div><!-- end #main -->
</div><!-- end #app -->

<script src="/app.js"></script>
<script src="/editor.js"></script>
<script>
// ── Canvas preview (draw mesh overlay) ───────────────────────────────────────
document.getElementById("ed-prev-btn").addEventListener("click", async () => {
  const cfgStr = editorExportConfig();
  if (!cfgStr) return;
  let cfg;
  try { cfg = JSON.parse(cfgStr); } catch { return; }
  document.getElementById("ed-status").textContent = I18N[lang].meshing;
  const r = await fetch("/api/mesh_preview", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ cfg }),
  });
  if (!r.ok) {
    document.getElementById("ed-status").textContent = I18N[lang].err + ": " + await r.text();
    return;
  }
  const { nodes, elements } = await r.json();
  _drawMeshOnCanvas(nodes, elements);
  document.getElementById("ed-status").textContent =
    `${I18N[lang].done}: ${nodes.length} ${lang === "es" ? "nodos" : "nodes"}, ${elements.length} ${lang === "es" ? "elementos" : "elements"}.`;
});

// ── Export canvas → text mode ─────────────────────────────────────────────────
document.getElementById("ed-export-btn").addEventListener("click", () => {
  const cfgStr = editorExportConfig();
  if (!cfgStr) return;
  document.getElementById("cfg").value = cfgStr;
  switchView("text");
  document.getElementById("status").textContent =
    lang === "es"
      ? "Ficha exportada desde el canvas. Revisá y hacé clic en Calcular."
      : "Config exported from canvas. Review and click Run.";
});

// ── Mesh overlay on canvas SVG ────────────────────────────────────────────────
function _drawMeshOnCanvas(nodes, elements) {
  const worldG = document.getElementById("ed-world");
  const old = document.getElementById("ed-mesh-overlay");
  if (old) old.remove();
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.id = "ed-mesh-overlay";
  g.setAttribute("opacity", "0.5");
  const xs = nodes.map(n => n[0]);
  const W = Math.max(...xs) - Math.min(...xs) || 1;
  const sw = W * 0.0025;
  elements.forEach(el => {
    const pts = el.map(i => `${nodes[i][0]},${nodes[i][1]}`).join(" ");
    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    poly.setAttribute("points", pts);
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke", "#34d399");
    poly.setAttribute("stroke-width", sw);
    g.appendChild(poly);
  });
  worldG.appendChild(g);
}

// ── Accordion toggle ──────────────────────────────────────────────────────────
function toggleAcc(id) {
  document.getElementById(id).classList.toggle("expanded");
}
</script>
</body>
</html>
